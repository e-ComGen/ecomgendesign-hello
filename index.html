<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ecomgendesign — Hello World</title>
  <style>
    :root {
      --navy: #1A2332;
      --orange: #F4842F;
      --bg: #FAFAFA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--navy);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 600px;
      width: 100%;
      background: white;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      box-shadow: 0 4px 24px rgba(26, 35, 50, 0.06);
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .accent { color: var(--orange); }
    p { color: #555; line-height: 1.6; margin-bottom: 1rem; }
    .meta {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
      font-size: 0.85rem;
      color: #888;
    }
    code {
      background: #f0f0f0;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 0.85em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello from <span class="accent">ecomgendesign</span></h1>
    <p>This is the test site, served from Cloudflare Pages.</p>
    <p>If you're reading this — the deploy worked.</p>
    <div class="meta">
      Static HTML · Hosted on CF Pages · Domain: <code>e-comgen.site</code> (coming soon)
    </div>
  </div>
</body>
</html>
