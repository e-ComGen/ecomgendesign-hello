name = "ecomgendesign-hello"
compatibility_date = "2025-01-01"

# Static-asset deployment: Astro builds the entire site (static HTML/CSS/JS/images)
# into ./dist. Wrangler uploads that folder as Workers Static Assets.
# No worker code needed — pure static delivery via CF's edge CDN.
[assets]
directory = "./dist"
not_found_handling = "404-page"
